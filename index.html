<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClientPro Hub v2.0 — All Modules & Templates Accessible</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div id="appShell" class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="logo">CP</div>
        <div>
          <h1>ClientPro Hub</h1>
          <p>v2.0 No Login Build</p>
        </div>
      </div>
      <nav id="nav" class="nav"></nav>
    </aside>

    <main>
      <header>
        <button class="menu-btn" type="button" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <strong id="title">Dashboard</strong>
        <span class="version">v2.0 Accessible Modules</span>
        <input id="globalSearch" placeholder="Search customers, invoices, projects..." />
        <button class="primary" type="button" onclick="go('quotationCreate')">+ Quotation</button>
      </header>
      <section id="app"></section>
    </main>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
